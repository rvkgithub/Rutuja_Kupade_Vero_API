# Vero API — local development configuration
#
# Database: H2 in-memory. All data is lost on application restart. This is intentional
# for development. The H2 console is available at http://localhost:8080/h2-console
# while the application is running. Use JDBC URL: jdbc:h2:mem:verodb
#
# For production: replace the datasource block with PostgreSQL credentials,
# set spring.jpa.hibernate.ddl-auto=validate, and manage schema with migrations.
# Never commit production credentials to this file.

spring.application.name=vero-api

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:verodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 web console (available at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Seed data — run data.sql after Hibernate has built the schema
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true

# Server
server.port=8080
